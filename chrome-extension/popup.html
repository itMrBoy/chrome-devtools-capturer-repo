<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DevTools Capturer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e2e8f0;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #2d2d4e;
    }
    .header-icon { font-size: 18px; }
    .header-title {
      font-size: 14px;
      font-weight: 600;
      color: #f1f5f9;
      letter-spacing: 0.02em;
    }

    /* ── Phase Badge ── */
    .phase-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px 0;
    }
    .phase-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .phase-dot.unarmed   { background: #6b7280; }
    .phase-dot.armed     { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
    .phase-dot.capturing {
      background: #ef4444;
      box-shadow: 0 0 6px #ef444488;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .phase-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    /* ── WS indicator ── */
    .ws-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 16px 12px;
    }
    .ws-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #6b7280;
      transition: background 0.3s;
    }
    .ws-dot.connected { background: #22c55e; }
    .ws-label { font-size: 11px; color: #64748b; }

    /* ── Status message ── */
    .status-box {
      margin: 0 16px 12px;
      padding: 10px 12px;
      background: #16213e;
      border: 1px solid #2d2d4e;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: #cbd5e1;
      min-height: 52px;
    }
    .status-box .hint {
      color: #64748b;
      font-size: 11px;
      margin-top: 4px;
    }

    /* ── Action button ── */
    .btn-wrap { padding: 0 16px 14px; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start    { background: #22c55e; color: #052e16; }
    .btn-stop     { background: #ef4444; color: #fff; }
    .btn-waiting  { background: #2d2d4e; color: #64748b; }

    /* ── Shortcut hint ── */
    .shortcut {
      text-align: center;
      padding: 0 16px 14px;
      font-size: 11px;
      color: #475569;
    }
    kbd {
      display: inline-block;
      padding: 1px 5px;
      background: #2d2d4e;
      border: 1px solid #3f3f5e;
      border-radius: 4px;
      font-family: monospace;
      font-size: 10px;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">⚡</span>
    <span class="header-title">DevTools Capturer</span>
  </div>

  <div class="phase-row">
    <div class="phase-dot unarmed" id="phaseDot"></div>
    <span class="phase-label" id="phaseLabel">UNARMED</span>
  </div>

  <div class="ws-row">
    <div class="ws-dot" id="wsDot"></div>
    <span class="ws-label" id="wsLabel">MCP Server 未连接</span>
  </div>

  <div class="status-box">
    <div id="statusMsg">正在初始化...</div>
    <div class="hint" id="statusHint"></div>
  </div>

  <div class="btn-wrap">
    <button class="btn btn-waiting" id="actionBtn" disabled>— 等待中 —</button>
  </div>

  <div class="shortcut">
    快捷键 <kbd>Alt+Shift+C</kbd> 可直接触发
  </div>

  <script src="popup.js"></script>
</body>
</html>
